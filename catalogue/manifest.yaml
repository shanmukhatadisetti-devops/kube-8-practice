apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: catalogue
  labels:
    project: roboshop
    env: dev
    component: catalogue
data:
  MONGO: "true" 
  MONGO_URL: "mongodb://mongodb:27017/catalogue"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  labels: 
    project: roboshop
    env: dev
    component: catalogue
  namespace: roboshop
spec:
  replicas: 2
  selector:
    matchLabels:
      project: roboshop
      env: dev
      component: catalogue
  template:
    metadata:
      labels:
        project: roboshop
        env: dev
        component: catalogue
    spec:
      containers:
      - name: catalogue
        image: shanmukhatadisetti/catalogue:v1