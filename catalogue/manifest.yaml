apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  labels:
    project: roboshop
    env: dev
    component: catalogue
data:
  MONGO: "true" 
  MONGO_URL: "mongodb://mongodb:27017/catalogue"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  labels: 
    project: roboshop
    env: dev
    component: catalogue
spec:
  replicas: 2
  selector:
    matchLabels:
      project: roboshop
      env: dev
      component: catalogue
  template:
    metadata:
      labels:
        project: roboshop
        env: dev
        component: catalogue
    spec:
      containers:
      - name: catalogue
        image: shanmukhatadisetti/catalogue:v1
        envFrom:
        - configMapRef:
            name: catalogue
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  labels:
    project: roboshop
    env: dev
    component: catalogue
spec:
  selector:
    project: roboshop
    env: dev
    component: catalogue
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080